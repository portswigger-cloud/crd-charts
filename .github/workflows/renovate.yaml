name: Renovate

on:
  schedule:
    - cron: '30 10 1-7,14-21 * 1' # 10:30 every Monday that falls on 1st-7th or 14th-21st of the month
  workflow_dispatch: {}


jobs:
  renovate:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      
      - name: Get token
        id: get_token
        run: |
          set -euo pipefail

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error::OIDC environment not present. Add 'permissions: { id-token: write }' to the calling job."
            exit 1
          fi
  
          jwt=$(curl --fail-with-body -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=idcat.platform-prod.portswigger.io" \
            | jq -r .value)
  
          token=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${jwt}" \
            https://idcat.platform-prod.portswigger.io/installation-token/portswigger-renovate/portswigger-cloud/crd-charts)
  
          echo "::add-mask::${token}"
          echo "app_token=${token}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: 'x-access-token:${{ steps.get_token.outputs.app_token }}'
        env:
          RENOVATE_USERNAME: portswigger-renovate[bot]
          RENOVATE_GIT_AUTHOR: "portswigger-renovate[bot] <121548138+portswigger-renovate[bot]@users.noreply.github.com>"
          RENOVATE_ONBOARDING: "false"
          RENOVATE_DEPENDENCY_DASHBOARD: "true"
          RENOVATE_DEPENDENCY_DASHBOARD_AUTOCLOSE: "true"
          RENOVATE_PR_HOURLY_LIMIT: "0"
          RENOVATE_PR_CONCURRENT_LIMIT: "0"
          RENOVATE_REQUIRE_CONFIG: ignored
          RENOVATE_REPOSITORIES: ${{ github.repository }}
